<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hell Rises Intro</title>
    <style>
        :root {
            --fire-glow: rgba(255, 69, 0, 0.6);
            --deep-red: #4e0000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
        }

        /* The pulsating floor gradient */
        .floor-glow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40vh;
            background: radial-gradient(ellipse at bottom, var(--deep-red) 0%, transparent 70%);
            animation: pulse 3s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.2); }
        }

        /* The Title with Impact Animation */
        .title-container {
            z-index: 10;
            perspective: 1000px;
        }

        .title {
            color: #fff;
            font-size: 8rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8), 0 0 50px #000;
            opacity: 0;
            transform: scale(5) translateZ(500px);
            animation: impact 0.6s cubic-bezier(0.17, 0.84, 0.44, 1) forwards;
            animation-delay: 0.5s;
        }

        @keyframes impact {
            0% {
                opacity: 0;
                transform: scale(5) translateZ(500px);
                filter: blur(20px);
            }
            80% {
                opacity: 1;
                transform: scale(0.9); /* Slight undershoot for weight */
                filter: blur(0px);
            }
            100% {
                opacity: 1;
                transform: scale(1);
                /* Screen shake effect on impact */
                text-shadow: 0 0 10px red, 0 0 30px orange;
            }
        }

        /* Screen Shake triggered by the title impact */
        .shake-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: camera-shake 0.2s 1.1s ease-out forwards;
        }

        @keyframes camera-shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(5px, -5px); }
            50% { transform: translate(-5px, 5px); }
            100% { transform: translate(0,0); }
        }

        /* Particles/Embers */
        .ember {
            position: absolute;
            background: orange;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.8;
            filter: blur(1px);
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="shake-overlay"></div>
    
    <div class="title-container">
        <h1 class="title">HELL RISES</h1>
    </div>

    <div class="floor-glow"></div>

    <script>
        function createEmber() {
            const ember = document.createElement('div');
            ember.classList.add('ember');
            
            // Randomize size, position, and speed
            const size = Math.random() * 4 + 1;
            const startX = Math.random() * window.innerWidth;
            const duration = Math.random() * 3 + 2;
            const drift = (Math.random() - 0.5) * 200;

            ember.style.width = `${size}px`;
            ember.style.height = `${size}px`;
            ember.style.left = `${startX}px`;
            ember.style.bottom = `0px`;
            
            document.body.appendChild(ember);

            // Animate using JS for more randomness than CSS allows
            const animation = ember.animate([
                { transform: `translateY(0) translateX(0) scale(1)`, opacity: 1 },
                { transform: `translateY(-${window.innerHeight}px) translateX(${drift}px) scale(0)`, opacity: 0 }
            ], {
                duration: duration * 1000,
                easing: 'linear'
            });

            animation.onfinish = () => ember.remove();
        }

        // Emit embers continuously
        setInterval(createEmber, 100);
    </script>
</body>
</html>
