<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hell Rises</title>
    <style>
        /* Import a gritty, typewriter-style font */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

        body {
            margin: 0;
            background-color: #0a0000; /* Deep dark red/black */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ff4400;
            font-family: 'Courier Prime', monospace;
        }
        canvas {
            background-color: #1a0505;
            border: 4px solid #551100;
            box-shadow: 0 0 30px rgba(255, 50, 0, 0.3); /* Fiery glow */
        }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffaa00; font-weight: bold;}
    </style>
</head>
<body>

    <div id="ui">Connect PS5 Controller...</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // Game State variable ('menu' or 'play')
    let gameState = 'menu';

    // Player Object
    const player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 15,
        speed: 6,
        color: '#ff8800' // Fiery orange
    };

    const DEADZONE = 0.15; 
    let controllerConnected = false;

    function update() {
        const gamepads = navigator.getGamepads();
        const pad = gamepads[0]; 

        if (pad) {
            controllerConnected = true;
            
            // MENU STATE LOGIC
            if (gameState === 'menu') {
                ui.innerText = "Main Menu";
                // Press 'X' (Button 0) to start
                if (pad.buttons[0].pressed) {
                    gameState = 'play';
                }
            } 
            
            // PLAY STATE LOGIC
            else if (gameState === 'play') {
                ui.innerText = "Survive the depths.";
                
                let moveX = pad.axes[0];
                let moveY = pad.axes[1];

                if (Math.abs(moveX) > DEADZONE) player.x += moveX * player.speed;
                if (Math.abs(moveY) > DEADZONE) player.y += moveY * player.speed;

                // Keep player inside the canvas
                player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
                player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            }
        } else {
            controllerConnected = false;
            ui.innerText = "Waiting for PS5 Controller...";
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'menu') {
            // Draw Title Screen
            ctx.fillStyle = "#ff2200";
            ctx.font = "bold 80px 'Courier Prime'";
            ctx.textAlign = "center";
            ctx.fillText("HELL RISES", canvas.width / 2, canvas.height / 2 - 40);

            ctx.fillStyle = "#ffaa00";
            ctx.font = "24px 'Courier Prime'";
            
            if (controllerConnected) {
                // Make the start prompt blink slightly based on time
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillText("Press [X] on Controller to Start", canvas.width / 2, canvas.height / 2 + 40);
                }
            } else {
                ctx.fillText("Please connect a controller to play", canvas.width / 2, canvas.height / 2 + 40);
            }
        } 
        else if (gameState === 'play') {
            // Draw Gameplay
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            
            // Add a slight glow to the player
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.closePath();
            
            // Reset shadow so it doesn't mess up other drawings later
            ctx.shadowBlur = 0; 
        }
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>

</body>
</html>
