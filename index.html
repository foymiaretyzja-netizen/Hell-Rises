<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hell Rises - Intro</title>
    <style>
        /* Base Styling */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050000;
            color: white;
            font-family: 'Trebuchet MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Pulsating Bottom Gradient */
        #bottom-glow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 45%;
            background: linear-gradient(to top, rgba(200, 20, 0, 0.3) 0%, transparent 100%);
            z-index: 1;
            animation: pulse-glow 3s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Ember Canvas Setup */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* UI Container */
        #ui-layer {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: center;
        }

        /* Zoom-Impact Title Animation */
        #title {
            font-size: 8rem;
            font-weight: 900;
            color: #ff2a00;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 5px 25px rgba(255, 0, 0, 0.8), 0 0 5px rgba(255, 100, 0, 0.5);
            /* Initial state before animation */
            opacity: 0; 
            transform: scale(4); 
            /* The slam: fast in, hard stop */
            animation: impact 0.4s cubic-bezier(.2,.9,.3,1.1) forwards;
        }

        @keyframes impact {
            0% { transform: scale(5); opacity: 0; }
            80% { transform: scale(0.95); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Press X to Continue */
        #press-x {
            margin-top: 80px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            opacity: 0; /* Hidden initially */
            color: #dddddd;
        }

        /* Added via JS after 5 seconds */
        .show-pulse {
            animation: text-pulse 1.2s infinite alternate forwards;
        }

        @keyframes text-pulse {
            0% { opacity: 0.3; text-shadow: 0 0 0px transparent; }
            100% { opacity: 1; text-shadow: 0 0 15px rgba(255, 255, 255, 0.8); }
        }

        /* PlayStation 'Cross' Button styling */
        .ps5-x {
            color: #7A9BCC;
            font-weight: bold;
            font-size: 1.3em;
        }
    </style>
</head>
<body>

    <div id="bottom-glow"></div>
    <canvas id="embers"></canvas>

    <div id="ui-layer">
        <div id="title">Hell Rises</div>
        <div id="press-x">Press <span class="ps5-x">&#10005;</span> to continue</div>
    </div>

    <script>
        // --- 1. TIMING LOGIC ---
        let canProceed = false;

        // Show the "Press X" text after 5 seconds (5000 milliseconds)
        setTimeout(() => {
            const pressXText = document.getElementById('press-x');
            pressXText.classList.add('show-pulse');
            canProceed = true;
        }, 5000);


        // --- 2. EMBER PARTICLE SYSTEM ---
        const canvas = document.getElementById('embers');
        const ctx = canvas.getContext('2d');
        
        // Resize canvas to window
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];

        function createEmber() {
            particles.push({
                x: Math.random() * canvas.width,
                y: canvas.height + 10, // Start slightly below screen
                radius: Math.random() * 2.5 + 0.5,
                dx: (Math.random() - 0.5) * 1.5, // Drift left/right
                dy: -(Math.random() * 2 + 1),    // Float up
                life: 1, // Opacity
                decay: Math.random() * 0.005 + 0.002,
                color: Math.random() > 0.6 ? '255, 60, 0' : '255, 140, 0' // Red/Orange mix
            });
        }

        function animateEmbers() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Control ember density
            if (Math.random() < 0.5) createEmber();
            
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.dx;
                p.y += p.dy;
                p.life -= p.decay;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color}, ${p.life})`;
                ctx.fill();
                
                // Remove dead particles
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateEmbers);
        }
        animateEmbers();


        // --- 3. PS5 CONTROLLER LOGIC ---
        // In the standard Gamepad API, the primary face button (Cross/X on PS) is button[0]
        let buttonPressedPreviously = false;

        function pollGamepads() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            
            for (let i = 0; i < gamepads.length; i++) {
                const pad = gamepads[i];
                if (pad) {
                    // Button 0 is the 'South' button (Cross on PS5, A on Xbox)
                    const xButton = pad.buttons[0];
                    
                    if (xButton.pressed && !buttonPressedPreviously) {
                        buttonPressedPreviously = true;
                        
                        if (canProceed) {
                            handleContinue();
                        }
                    } else if (!xButton.pressed) {
                        buttonPressedPreviously = false;
                    }
                }
            }
            // Keep polling every frame
            requestAnimationFrame(pollGamepads);
        }
        pollGamepads();

        // Keyboard fallback for testing (Spacebar or 'X' key)
        window.addEventListener('keydown', (e) => {
            if ((e.code === 'Space' || e.key.toLowerCase() === 'x') && canProceed) {
                handleContinue();
            }
        });

        // Triggered when X is pressed after 5 seconds
        function handleContinue() {
            canProceed = false; // Prevent double-triggering
            
            // Example transition effect
            document.body.style.transition = "opacity 1s";
            document.body.style.opacity = "0";
            
            setTimeout(() => {
                alert("Game starting! (Transition logic goes here)");
                document.body.style.opacity = "1"; // Reset for demo
                canProceed = true;
            }, 1000);
        }
    </script>
</body>
</html>
