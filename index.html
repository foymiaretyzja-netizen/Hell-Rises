<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS5 Controller Game Revamp</title>
    <style>
        body {
            margin: 0;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background-color: #111;
            border: 4px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #ui { position: absolute; top: 20px; left: 20px; }
    </style>
</head>
<body>

    <div id="ui">Connect PS5 Controller and press any button to start!</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');

    // Player Object
    const player = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        radius: 15,
        speed: 5,
        color: '#00ffcc'
    };

    // Controller deadzone to prevent "stick drift"
    const DEADZONE = 0.15; 

    function update() {
        // The Gamepad API needs to be polled every single frame
        const gamepads = navigator.getGamepads();
        const pad = gamepads[0]; // Grabs the first connected controller

        if (pad) {
            ui.innerText = "PS5 Controller Connected! Use Left Stick to move.";

            // Left Stick Axes (0 is X-axis left/right, 1 is Y-axis up/down)
            let moveX = pad.axes[0];
            let moveY = pad.axes[1];

            // Apply deadzone so the player doesn't drift when the stick is resting
            if (Math.abs(moveX) > DEADZONE) {
                player.x += moveX * player.speed;
            }
            if (Math.abs(moveY) > DEADZONE) {
                player.y += moveY * player.speed;
            }

            // Optional: Map the "X" button (Button 0) to a dash or special ability later
            if (pad.buttons[0].pressed) {
                player.color = '#ff0055'; // Change color when pressing X
            } else {
                player.color = '#00ffcc';
            }

            // Keep player inside the canvas walls
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
        }
    }

    function draw() {
        // Clear the screen every frame
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw the player
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = player.color;
        ctx.fill();
        ctx.closePath();
    }

    // The core Game Loop
    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop); // Calls the loop 60 times a second
    }

    // Start the game loop
    gameLoop();
</script>

</body>
</html>
