<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hell Rises Intro</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050000;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
            transition: opacity 1s ease-out; /* For the fade-out effect later */
        }

        /* The Impact Title */
        .title-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            perspective: 1000px;
        }

        .title {
            font-size: 8rem;
            color: #ff3300;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(255, 68, 0, 0.8);
            opacity: 0;
            animation: zoomImpact 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                      shake 0.15s 0.6s ease-in-out 3;
        }

        @keyframes zoomImpact {
            0% { transform: scale(10); opacity: 0; filter: blur(20px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -1px) rotate(1deg); }
        }

        /* Pulsating Bottom Gradient */
        .bottom-glow {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30vh;
            background: linear-gradient(to top, #661100, #ff4400, transparent);
            opacity: 0.6;
            animation: pulse 3s infinite alternate ease-in-out;
            pointer-events: none;
        }

        @keyframes pulse {
            from { opacity: 0.4; height: 25vh; }
            to { opacity: 0.8; height: 35vh; }
        }

        #emberCanvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
        }

        /* NEW: Press X Prompt */
        .start-prompt {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: #aaaaaa;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            /* Start hidden, delay animation until after title impact */
            opacity: 0; 
            animation: fadeInBlink 2s 1.5s infinite alternate ease-in-out;
            z-index: 10;
        }

        .ps-x {
            color: #7a9cff; /* Standard PlayStation Blue */
            font-weight: bold;
            font-family: sans-serif;
            text-shadow: 0 0 8px rgba(122, 156, 255, 0.6);
        }

        @keyframes fadeInBlink {
            0% { opacity: 0.2; }
            100% { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        }
    </style>
</head>
<body>

    <div class="title-container">
        <h1 class="title">HELL RISES</h1>
    </div>

    <div id="startPrompt" class="start-prompt">
        Press <span class="ps-x">X</span> to Continue
    </div>

    <div class="bottom-glow"></div>
    <canvas id="emberCanvas"></canvas>

    <script>
        // --- Canvas & Ember Logic ---
        const canvas = document.getElementById('emberCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        class Ember {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 10;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * -2 - 1;
                this.speedX = Math.random() * 2 - 1;
                this.life = 1;
                this.decay = Math.random() * 0.01 + 0.005;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.life -= this.decay;
            }
            draw() {
                ctx.fillStyle = `rgba(255, ${Math.floor(this.life * 150)}, 0, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // --- Gamepad & Input Logic ---
        let isTransitioning = false;

        function startGame() {
            if (isTransitioning) return; // Prevent multiple triggers
            isTransitioning = true;
            
            console.log("Start trigger fired! Proceeding to main menu/game...");
            
            // Trigger a dramatic fade to black
            document.body.style.opacity = 0;

            // Here is where you would load your next scene or canvas state
            // setTimeout(() => { window.location.href = 'main_game.html'; }, 1000);
        }

        // Keyboard fallback for testing
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                startGame();
            }
        });

        function pollGamepads() {
            // Get all connected controllers
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            
            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i];
                if (gp) {
                    // Button 0 is the Cross (X) button on PlayStation controllers
                    if (gp.buttons[0].pressed) {
                        startGame();
                    }
                }
            }
        }

        // --- Main Animation Loop ---
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (particles.length < 100) {
                particles.push(new Ember());
            }

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            // Check controller input every frame
            pollGamepads();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
